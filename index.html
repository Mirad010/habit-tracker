<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Tracker Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f0f1a;
      min-height: 100vh;
      color: white;
      padding: 30px 20px;
    }

    .container { max-width: 700px; margin: 0 auto; }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 2.8em;
      letter-spacing: 4px;
      color: #f0c040;
      margin-bottom: 8px;
    }

    .header .date {
      color: #888;
      font-size: 1em;
    }

    .score-card {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: 20px;
      padding: 25px 30px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(240,192,64,0.2);
    }

    .score-label { color: #888; font-size: 0.9em; margin-bottom: 5px; }
    .score-number { font-size: 2.5em; font-weight: bold; color: #f0c040; }
    .score-divider { width: 1px; height: 60px; background: rgba(255,255,255,0.1); }

    .add-section {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 25px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .add-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .add-row input {
      flex: 1;
      padding: 12px 18px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 1em;
    }

    .add-row input:focus {
      outline: none;
      border-color: #f0c040;
    }

    .add-row input::placeholder { color: #666; }

    select {
      padding: 12px 18px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 1em;
      cursor: pointer;
    }

    select:focus { outline: none; border-color: #f0c040; }
    select option { background: #1a1a2e; }

    .btn-add {
      padding: 12px 25px;
      background: #f0c040;
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-add:hover { background: white; transform: translateY(-1px); }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 7px 18px;
      border-radius: 20px;
      border: 2px solid rgba(255,255,255,0.15);
      background: transparent;
      color: #aaa;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.2s;
    }

    .filter-btn.active {
      border-color: #f0c040;
      color: #f0c040;
      background: rgba(240,192,64,0.1);
    }

    .habits-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .habits-title { font-size: 1.1em; color: #888; }

    .habit-card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.3s;
    }

    .habit-card:hover { border-color: rgba(240,192,64,0.3); }
    .habit-card.completed { border-color: rgba(46,204,113,0.3); background: rgba(46,204,113,0.05); }

    .habit-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .habit-left { display: flex; align-items: center; gap: 12px; }

    .category-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75em;
      font-weight: bold;
    }

    .cat-Health { background: rgba(46,204,113,0.2); color: #2ecc71; }
    .cat-Study { background: rgba(52,152,219,0.2); color: #3498db; }
    .cat-Personal { background: rgba(155,89,182,0.2); color: #9b59b6; }

    .habit-name { font-size: 1.1em; font-weight: bold; }

    .habit-right { display: flex; align-items: center; gap: 10px; }

    .streak-badge {
      background: rgba(240,192,64,0.15);
      color: #f0c040;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: bold;
    }

    .best-streak {
      color: #666;
      font-size: 0.8em;
    }

    .btn-done {
      padding: 8px 20px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9em;
      transition: all 0.2s;
    }

    .btn-done.not-done {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .btn-done.not-done:hover { background: rgba(46,204,113,0.3); }

    .btn-done.done {
      background: #2ecc71;
      color: white;
    }

    .btn-delete {
      background: transparent;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 1.1em;
      padding: 5px;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    .btn-delete:hover { opacity: 1; }

    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.4s ease;
    }

    .progress-fill.low { background: #e74c3c; }
    .progress-fill.mid { background: #f0c040; }
    .progress-fill.high { background: #2ecc71; }

    .progress-text {
      font-size: 0.75em;
      color: #666;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #555;
    }

    .empty h2 { font-size: 1.5em; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>HABIT TRACKER</h1>
    <div class="date" id="dateDisplay"></div>
  </div>

  <div class="score-card">
    <div>
      <div class="score-label">Today's Progress</div>
      <div class="score-number" id="todayScore">0/0</div>
    </div>
    <div class="score-divider"></div>
    <div>
      <div class="score-label">Total Habits</div>
      <div class="score-number" id="totalHabits">0</div>
    </div>
    <div class="score-divider"></div>
    <div>
      <div class="score-label">Best Streak</div>
      <div class="score-number" id="bestOverall">0</div>
    </div>
  </div>

  <div class="add-section">
    <div class="add-row">
      <input type="text" id="habitInput" placeholder="Add a new habit..." />
      <select id="categorySelect">
        <option value="Health">🏃 Health</option>
        <option value="Study">📚 Study</option>
        <option value="Personal">⭐ Personal</option>
      </select>
      <button class="btn-add" onclick="addHabit()">+ Add</button>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('All')">All</button>
      <button class="filter-btn" onclick="setFilter('Health')">🏃 Health</button>
      <button class="filter-btn" onclick="setFilter('Study')">📚 Study</button>
      <button class="filter-btn" onclick="setFilter('Personal')">⭐ Personal</button>
    </div>
  </div>

  <div class="habits-header">
    <span class="habits-title" id="habitsTitle">All Habits</span>
  </div>

  <div id="habitList"></div>

</div>

<script>
  let habits = JSON.parse(localStorage.getItem('habitTrackerPro')) || [];
  let currentFilter = 'All';
  const today = new Date().toDateString();

  document.getElementById('dateDisplay').textContent = today;

  function save() {
    localStorage.setItem('habitTrackerPro', JSON.stringify(habits));
  }

  function addHabit() {
    const input = document.getElementById('habitInput');
    const category = document.getElementById('categorySelect').value;
    const name = input.value.trim();
    if (!name) return;

    habits.push({
      id: Date.now(),
      name,
      category,
      streak: 0,
      bestStreak: 0,
      completedDates: [],
      createdAt: today
    });

    input.value = '';
    save();
    render();
  }

  function toggleHabit(id) {
    const habit = habits.find(h => h.id === id);
    if (!habit) return;

    if (habit.completedDates.includes(today)) {
      habit.completedDates = habit.completedDates.filter(d => d !== today);
      habit.streak = Math.max(0, habit.streak - 1);
    } else {
      habit.completedDates.push(today);
      habit.streak++;
      if (habit.streak > habit.bestStreak) habit.bestStreak = habit.streak;
    }

    save();
    render();
  }

  function deleteHabit(id) {
    if (!confirm('Delete this habit?')) return;
    habits = habits.filter(h => h.id !== id);
    save();
    render();
  }

  function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.includes(filter) || (filter === 'All' && btn.textContent === 'All'));
    });
    render();
  }

  function render() {
    const list = document.getElementById('habitList');
    const filtered = currentFilter === 'All' ? habits : habits.filter(h => h.category === currentFilter);
    const completed = habits.filter(h => h.completedDates.includes(today)).length;
    const bestOverall = habits.reduce((max, h) => Math.max(max, h.bestStreak), 0);

    document.getElementById('todayScore').textContent = `${completed}/${habits.length}`;
    document.getElementById('totalHabits').textContent = habits.length;
    document.getElementById('bestOverall').textContent = bestOverall;
    document.getElementById('habitsTitle').textContent = currentFilter === 'All' ? 'All Habits' : `${currentFilter} Habits`;

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty"><h2>No habits here</h2><p>Add your first habit above</p></div>`;
      return;
    }

    list.innerHTML = filtered.map(habit => {
      const isDone = habit.completedDates.includes(today);
      const progress = Math.min(100, (habit.streak / 30) * 100);
      const colorClass = progress < 33 ? 'low' : progress < 66 ? 'mid' : 'high';

      return `
        <div class="habit-card ${isDone ? 'completed' : ''}">
          <div class="habit-top">
            <div class="habit-left">
              <span class="category-badge cat-${habit.category}">${habit.category}</span>
              <span class="habit-name">${habit.name}</span>
            </div>
            <div class="habit-right">
              <span class="streak-badge">🔥 ${habit.streak} days</span>
              <span class="best-streak">Best: ${habit.bestStreak}</span>
              <button class="btn-done ${isDone ? 'done' : 'not-done'}" onclick="toggleHabit(${habit.id})">
                ${isDone ? '✓ Done' : 'Mark Done'}
              </button>
              <button class="btn-delete" onclick="deleteHabit(${habit.id})">🗑</button>
            </div>
          </div>
          <div class="progress-bar">
            <div class="progress-fill ${colorClass}" style="width: ${progress}%"></div>
          </div>
          <div class="progress-text">${habit.streak}/30 days to master · Created ${habit.createdAt}</div>
        </div>
      `;
    }).join('');
  }

  document.getElementById('habitInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') addHabit();
  });

  render();
</script>

</body>
</html>
